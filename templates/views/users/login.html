{% extends 'vocacional/base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    <div class="text-center mb-4">
                        <img src="{{ url_for('static', filename='img/logo.png') }}" alt="BMV" class=" logo-bmv mx-auto mb-3 img-fluid" style="width:100px;height:56px;background:white">
                        <h5 class="fw-bold mb-0">Acceso Administrativo</h5>
                        <p class="text-muted small">Instituto Bolivar Madero Vargas</p>
                    </div>

                    <form method="POST" action="{{ url_for('users.login') }}">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold small">Correo Electrónico</label>
                            <input type="email" class="form-control" id="email" name="email"
                                   value="{{ email | default('') }}" required autofocus>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label fw-semibold small">Contraseña</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="password" name="password" required>
                                <button type="button" class="btn btn-outline-secondary"
                                        onclick="const i=document.getElementById('password'); i.type=i.type==='password'?'text':'password';">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-dark fw-semibold">
                                <i class="bi bi-shield-lock-fill me-1"></i>Iniciar Sesión
                            </button>
                        </div>

                        <div class="text-center mt-3">
                            <a href="{{ url_for('vocacional.index') }}" class="text-muted small">
                                <i class="bi bi-arrow-left me-1"></i>Volver al inicio
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
